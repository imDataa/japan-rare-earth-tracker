name: Update Tracker

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas feedparser

      - name: Run tracker and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          python tracker.py
          git add index.html
          git diff --staged --quiet || git commit -m "Update tracker $(date +'%Y-%m-%d')"
          git push origin HEAD:main
